<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>MAC Tools – MSC Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
      background: #f3f9ff;
    }

    .bg {
      position: fixed; inset: 0;
      background-image: url('https://www.figma.com/api/mcp/asset/902282d5-987d-4f5f-957a-fc8269552a2c');
      background-size: cover;
      filter: blur(7px) brightness(0.97);
      z-index: 0;
    }
    .bg-tint {
      position: fixed; inset: 0;
      background: rgba(243,249,255,0.82);
      z-index: 1;
    }

    #lines {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 50;
      overflow: visible;
    }

    .panel {
      position: fixed;
      right: 54px; top: 40px;
      width: 350px;
      z-index: 10;
    }

    .login-card {
      background: rgba(255,255,255,0.92);
      border: 1px solid #dbdeea;
      border-radius: 8px;
      box-shadow: 3px 3px 11px rgba(34,46,57,0.05);
      padding: 20px;
    }
    .login-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
    .logo-box {
      flex-shrink: 0; width: 60px; height: 60px;
      background: #fff; border: 1px solid #dbdeea; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .logo-box img { width: 53px; height: 37px; object-fit: cover; }
    .welcome { display: flex; flex-direction: column; gap: 2px; padding-top: 4px; }
    .welcome-title { font-size: 22px; font-weight: 400; line-height: 26px; color: #343945; }
    .welcome-name  { font-size: 16px; font-weight: 700; color: #149c48; }
    label { display: block; font-size: 14px; color: #343945; margin-bottom: 6px; }
    input[type=password] {
      display: block; width: 100%; height: 36px;
      border: 1px solid #dbdeea; border-radius: 4px;
      padding: 0 12px; font-size: 14px; font-family: 'Lato', sans-serif;
      color: #343945; outline: none; letter-spacing: 3px; margin-bottom: 10px;
    }
    input[type=password]:focus { border-color: #3fa7fc; }
    .links { display: flex; justify-content: space-between; margin-bottom: 14px; }
    .links a { font-size: 10px; color: #343945; text-decoration: none; }
    .links a:hover { text-decoration: underline; }

    .btn-anchor { position: relative; width: 100%; height: 40px; }
    #login-btn {
      position: absolute; inset: 0;
      background: #149c48; border: none; border-radius: 5px;
      color: #fff; font-size: 14px; font-weight: 500;
      font-family: 'Lato', sans-serif; cursor: pointer;
      will-change: transform;
      transform: translate(0px, 0px);
    }

    /* ── Cat — positioned absolutely so it can animate to bottom-right ── */
    #cat-wrap {
      position: fixed;
      /* default: between the two cards, relative to panel */
      right: 54px;
      width: 350px;
      pointer-events: none;
      z-index: 20;
      /* top is set by JS once panel is measured */
      transition: none; /* JS drives this */
    }
    .cat-divider-inner {
      position: relative;
      height: 72px;
    }
    #cat-img {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-44%);
      width: 270px; height: auto;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,0.15));
      pointer-events: none;
    }

    /* When cat retreats, the .cat-divider placeholder keeps layout intact */
    .cat-divider-placeholder {
      height: 72px;
      pointer-events: none;
    }

    .tabs-card { position: relative; z-index: 10; }
    .tabs-header { display: flex; position: relative; }
    .tab {
      flex: 1; height: 39px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 14px; font-weight: 600; font-family: 'Lato', sans-serif;
      border: 1px solid #dbdeea; position: relative;
    }
    .tab-news {
      background: rgba(255,255,255,0.92); border-radius: 4px 4px 0 0;
      color: #343945; border-bottom: none; z-index: 2;
    }
    .tab-news::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px; background: #3fa7fc; border-radius: 8px 8px 0 0;
    }
    .tab-learn {
      background: rgba(251,251,253,0.92); border-radius: 0 8px 0 0;
      color: #69757b; z-index: 1;
    }
    .tab-sep {
      position: absolute; left: 50%; top: 50%; transform: translateY(-50%);
      width: 1px; height: 36px; background: #dbdeea; z-index: 3;
    }
    .tab-icon { width: 19px; height: 19px; display: flex; align-items: center; justify-content: center; }
    .tab-icon img { width: 19px; height: 19px; }
    .tab-body {
      background: rgba(255,255,255,0.92); border: 1px solid #dbdeea;
      border-top: none; border-radius: 0 0 8px 8px; padding: 18px 20px 22px;
    }
    .tab-body p { font-size: 12px; color: #343945; line-height: 1.65; margin-bottom: 16px; }
    .train-btn {
      width: 120px; height: 40px; border: 1px solid #dbdeea; border-radius: 4px;
      background: #fff; color: #3fa7fc; font-size: 14px; font-weight: 700;
      font-family: 'Lato', sans-serif; cursor: pointer;
    }
    .train-btn:hover { background: #eef6ff; }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-tint"></div>

<svg id="lines" xmlns="http://www.w3.org/2000/svg">
  <line id="ear-L" stroke="#e8192c" stroke-width="2.8" stroke-linecap="round"/>
  <line id="ear-R" stroke="#e8192c" stroke-width="2.8" stroke-linecap="round"/>
  <line id="paw"   stroke="#3fa7fc" stroke-width="6"   stroke-linecap="round"/>
</svg>

<div class="panel" id="panel">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-box">
        <img src="https://www.figma.com/api/mcp/asset/3a91971c-8e98-46a6-b195-cc4f31755b15" alt="logo"/>
      </div>
      <div class="welcome">
        <span class="welcome-title">Welcome Back</span>
        <span class="welcome-name">Anne Marie Shea</span>
      </div>
    </div>
    <label>Password</label>
    <input type="password" value="password" autocomplete="current-password"/>
    <div class="links">
      <a href="#">Forgot Password?</a>
      <a href="#">Switch Accounts</a>
    </div>
    <div class="btn-anchor" id="btn-anchor">
      <button id="login-btn">Login</button>
    </div>
  </div>

  <!-- placeholder keeps the gap in layout even when cat-wrap floats away -->
  <div class="cat-divider-placeholder"></div>

  <div class="tabs-card">
    <div class="tabs-header">
      <div class="tab tab-news">
        <span class="tab-icon"><img src="https://www.figma.com/api/mcp/asset/cf5b89bd-dc86-41d8-8657-71d7bf6d78ad" alt=""/></span>
        News
      </div>
      <div class="tab-sep"></div>
      <div class="tab tab-learn">
        <span class="tab-icon"><img src="https://www.figma.com/api/mcp/asset/a9eaf16a-69d2-4446-8237-f383db24498a" alt=""/></span>
        Learning
      </div>
    </div>
    <div class="tab-body">
      <p>All Webinars are Free! Sign up for one of our public sessions or feel free to request a private webinar. All at no cost. We also have other training available.</p>
      <button class="train-btn">Get Trained</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Config ── */
  const EAR_RADIUS   = 700;   // px → ears start reacting
  const PAW_RADIUS   = 600;   // px → paw starts rising
  const BAT_RADIUS   = 220;   // px → paw bats the button
  const MAX_OFFSET   = 120;   // max px button can drift from home
  const FLEE_DIST    = 400;   // px cursor→button → cat flees

  /* ── DOM ── */
  const elEarL  = document.getElementById('ear-L');
  const elEarR  = document.getElementById('ear-R');
  const elPaw   = document.getElementById('paw');
  const btn     = document.getElementById('login-btn');
  const anchor  = document.getElementById('btn-anchor');
  const catWrap = document.getElementById('cat-wrap');
  const catImg  = document.getElementById('cat-img');
  const panel   = document.getElementById('panel');

  /* ── Mouse ── */
  let mouseX = -9999, mouseY = -9999;
  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
  }, { passive: true });

  /* ── Button offset (from natural anchor center) ── */
  let btnOffX = 0, btnOffY = 0;

  /* ── Bat state ── */
  // 'idle' | 'wind-up' | 'bat' | 'recoil'
  let batPhase    = 'idle';
  let batStart    = 0;
  let batDirX     = 0, batDirY = 0;
  let batFromX    = 0, batFromY = 0;
  let batToX      = 0, batToY  = 0;
  let batCooldown = 0;
  /* Has the button been batted at least once? */
  let buttonWasBatted = false;

  /* ── Cat retreat state ── */
  // 'panel' | 'fleeing' | 'corner' | 'returning'
  let catState    = 'panel';
  let catFleeT0   = 0;
  const FLEE_DUR  = 900;   // ms for flee animation

  /* Cat flee animation: source position */
  let catSrcX = 0, catSrcY = 0;

  /* ── Math ── */
  const lerp  = (a, b, t) => a + (b - a) * t;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const ease3 = t => 1 - (1 - t) ** 3;
  const ease5 = t => 1 - (1 - t) ** 5;
  const easeInOut3 = t => t < 0.5 ? 4*t*t*t : 1 - (-2*t+2)**3/2;

  function setLine(el, x1, y1, x2, y2) {
    el.setAttribute('x1', x1); el.setAttribute('y1', y1);
    el.setAttribute('x2', x2); el.setAttribute('y2', y2);
  }

  /* Natural center of the button's layout anchor */
  function anchorCenter() {
    const r = anchor.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  /* Actual center of button accounting for current offset */
  function btnCenter() {
    const c = anchorCenter();
    return { x: c.x + btnOffX, y: c.y + btnOffY };
  }

  /* Cat image bounding box → ear/paw anchor points */
  function catPoints() {
    const r = catImg.getBoundingClientRect();
    const w = r.width, h = r.height;
    return {
      eLx: r.left + w * 0.20,  eLy: r.top + h * 0.28,
      eRx: r.left + w * 0.31,  eRy: r.top + h * 0.20,
      pBx: r.left + w * 0.43,  pBy: r.top + h * 0.72,
    };
  }

  /* ── Draw ears ── */
  function drawEars(cp, t, ts) {
    const len  = lerp(15, 32, t);
    const quiv = (t > 0.08 && t < 0.95 && catState === 'panel')
      ? Math.sin(ts * 0.016) * 2.4 * t : 0;
    const lAng = (lerp(134, 97, t) + quiv) * Math.PI / 180;
    const rAng = (lerp(46,  83, t) - quiv) * Math.PI / 180;
    setLine(elEarL, cp.eLx, cp.eLy,
      cp.eLx + Math.cos(lAng) * len, cp.eLy - Math.sin(lAng) * len);
    setLine(elEarR, cp.eRx, cp.eRy,
      cp.eRx + Math.cos(rAng) * len, cp.eRy - Math.sin(rAng) * len);
  }

  /* ── Draw paw ── */
  function drawPaw(cp, tipX, tipY, opacity) {
    setLine(elPaw, cp.pBx, cp.pBy, tipX, tipY);
    elPaw.style.opacity = String(clamp(opacity, 0, 1));
  }

  function restingPaw(cp) {
    const ang = 8 * Math.PI / 180;
    drawPaw(cp, cp.pBx + Math.cos(ang) * 28, cp.pBy - Math.sin(ang) * 28, 0.4);
  }

  /* Paw points toward a target (tipX, tipY) — used during idle approach */
  function raisedPaw(cp, t, targetX, targetY) {
    /* At t=0 it's resting; at t=1 it reaches toward the target */
    const dx = targetX - cp.pBx;
    const dy = targetY - cp.pBy;
    const dist = Math.hypot(dx, dy) || 1;
    const baseAng = 8 * Math.PI / 180;
    const targetAng = Math.atan2(-dy, dx);  /* screen Y is inverted */
    /* Interpolate angle from resting to pointing at target */
    const ang = lerp(baseAng, targetAng, t);
    const len = lerp(28, dist * 0.85, t);   /* extends most of the way */
    drawPaw(cp,
      cp.pBx + Math.cos(ang) * len,
      cp.pBy - Math.sin(ang) * len,
      lerp(0.4, 1.0, t));
  }

  /* ── Bat trigger ── */
  function triggerBat() {
    if (batPhase !== 'idle') return;
    if (performance.now() < batCooldown) return;

    /* Push button AWAY from cursor — vector from cursor to button center */
    const bc  = btnCenter();
    const dx  = bc.x - mouseX;
    const dy  = bc.y - mouseY;
    const mag = Math.hypot(dx, dy) || 1;
    batDirX = dx / mag;
    batDirY = dy / mag;

    /* Add a small random perpendicular wobble so repeated bats vary */
    const wobble = (Math.random() - 0.5) * 0.5;
    const wx = -batDirY * wobble;
    const wy =  batDirX * wobble;
    batDirX += wx; batDirY += wy;
    const mag2 = Math.hypot(batDirX, batDirY) || 1;
    batDirX /= mag2; batDirY /= mag2;

    const dist = 60 + Math.random() * 45;

    batFromX = btnOffX;
    batFromY = btnOffY;
    batToX   = clamp(btnOffX + batDirX * dist, -MAX_OFFSET, MAX_OFFSET);
    batToY   = clamp(btnOffY + batDirY * dist, -MAX_OFFSET, MAX_OFFSET);

    batPhase = 'wind-up';
    batStart = performance.now();
    buttonWasBatted = true;
  }

  /* ── Cat flee (one-way — cat stays in corner forever after fleeing) ── */
  function startFlee() {
    if (catState !== 'panel') return;
    catState  = 'fleeing';
    catFleeT0 = performance.now();

    /* Reset button to home immediately when cat leaves */
    btnOffX = 0; btnOffY = 0;
    btn.style.transform = 'translate(0px,0px)';
    batPhase = 'idle';

    /* Record where the cat currently is in viewport coords */
    const r = catWrap.getBoundingClientRect();
    catSrcX = r.left;
    catSrcY = r.top;

    /* Switch cat-wrap to absolute viewport positioning for animation */
    catWrap.style.transition = 'none';
    catWrap.style.right  = 'auto';
    catWrap.style.width  = catWrap.offsetWidth + 'px';
    catWrap.style.left   = catSrcX + 'px';
    catWrap.style.top    = catSrcY + 'px';
  }

  /* Target position when in corner: bottom-right, slightly inset */
  function cornerTarget() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const cw = catWrap.offsetWidth;
    return {
      x: vw - cw + 20,
      y: vh - 90,
    };
  }

  /* Apply cat-wrap position during animation */
  function setCatPos(x, y) {
    catWrap.style.left = x + 'px';
    catWrap.style.top  = y + 'px';
  }

  /* Keep cat-wrap top in sync with panel when in 'panel' state */
  function positionCatWrap() {
    const cardEl = panel.querySelector('.login-card');
    const cardR  = cardEl.getBoundingClientRect();
    catWrap.style.top = cardR.bottom + 'px';
  }

  /* ── Main rAF loop ── */
  function loop(ts) {
    requestAnimationFrame(loop);

    /* Always keep cat-wrap positioned under login card when in panel */
    if (catState === 'panel') {
      positionCatWrap();
    }

    const cp = catPoints();
    const ac = anchorCenter();
    const bc = btnCenter();

    const distToAnchor = Math.hypot(mouseX - ac.x, mouseY - ac.y);
    const distToBtn    = Math.hypot(mouseX - bc.x, mouseY - bc.y);

    /* ════════════════════════════════════════════
       CAT FLEE LOGIC
       Only activates after the button has been batted.
       If cursor is 400px+ from button → flee to corner permanently.
    ════════════════════════════════════════════ */
    if (buttonWasBatted && catState === 'panel' && batPhase === 'idle') {
      if (distToBtn > FLEE_DIST) {
        startFlee();
      }
    }

    /* ── Cat animation ── */
    if (catState === 'fleeing') {
      const raw = clamp((ts - catFleeT0) / FLEE_DUR, 0, 1);
      const t   = easeInOut3(raw);
      const tgt = cornerTarget();
      const x   = lerp(catSrcX, tgt.x, t);
      const y   = lerp(catSrcY, tgt.y, t);
      setCatPos(x, y);
      if (raw >= 1) {
        catState = 'corner';
        setCatPos(tgt.x, tgt.y);
        /* Hide ear/paw lines — cat is gone */
        elEarL.style.opacity = '0';
        elEarR.style.opacity = '0';
        elPaw.style.opacity  = '0';
      }
    }

    /* Don't draw ear/paw interactions when cat is not in panel */
    if (catState !== 'panel') return;

    /* Restore line opacity if hidden */
    elEarL.style.opacity = '';
    elEarR.style.opacity = '';

    /* ── Ear animation ── */
    const earT = distToAnchor < EAR_RADIUS
      ? ease3(1 - distToAnchor / EAR_RADIUS) : 0;
    drawEars(cp, earT, ts);

    /* ── Bat trigger ── */
    if (batPhase === 'idle' && distToBtn < BAT_RADIUS) {
      triggerBat();
    }

    /* ── Bat state machine ── */
    const elapsed = ts - batStart;

    if (batPhase === 'idle') {
      /* Paw rises and points toward button as cursor approaches */
      const pawT = distToAnchor < PAW_RADIUS
        ? ease3(1 - distToAnchor / PAW_RADIUS) : 0;

      if (pawT < 0.01) {
        restingPaw(cp);
      } else {
        raisedPaw(cp, pawT, bc.x, bc.y);
      }

      /* Gently drift button back to center when not being batted */
      btnOffX = lerp(btnOffX, 0, 0.055);
      btnOffY = lerp(btnOffY, 0, 0.055);

    } else if (batPhase === 'wind-up') {
      const t = clamp(elapsed / 120, 0, 1);
      /* Paw pulls back slightly — anticipation */
      const ang = lerp(52, 35, ease3(t)) * Math.PI / 180;
      const len = lerp(44, 28, ease3(t));
      drawPaw(cp, cp.pBx + Math.cos(ang) * len, cp.pBy - Math.sin(ang) * len, 1.0);
      drawEars(cp, 1, ts);
      if (t >= 1) { batPhase = 'bat'; batStart = ts; }

    } else if (batPhase === 'bat') {
      const t  = clamp(elapsed / 80, 0, 1);
      const et = ease5(t);

      /* Button launches */
      btnOffX = lerp(batFromX, batToX, et);
      btnOffY = lerp(batFromY, batToY, et);

      /* Paw extends all the way to the button's current position */
      const bc2 = btnCenter();
      drawPaw(cp, bc2.x, bc2.y, 1.0);
      drawEars(cp, 1, ts);
      if (t >= 1) { batPhase = 'recoil'; batStart = ts; }

    } else if (batPhase === 'recoil') {
      const t  = clamp(elapsed / 200, 0, 1);
      const et = ease3(t);

      /* Paw recoils back to resting */
      const ang = lerp(52, 8, et) * Math.PI / 180;
      const len = lerp(44, 28, et);
      drawPaw(cp, cp.pBx + Math.cos(ang) * len, cp.pBy - Math.sin(ang) * len,
        lerp(1.0, 0.4, et));
      drawEars(cp, lerp(1, earT, et), ts);

      /* Button stays where it landed */
      btnOffX = batToX;
      btnOffY = batToY;

      if (t >= 1) {
        batPhase    = 'idle';
        batCooldown = ts + 350;
      }
    }

    /* Apply button transform */
    btn.style.transform = `translate(${btnOffX.toFixed(2)}px,${btnOffY.toFixed(2)}px)`;
  }

  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
